<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0C0A09" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>DineAI — Your AI Dining Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body {
      background: #0C0A09;
      color: #FAFAF9;
      font-family: 'DM Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    *::-webkit-scrollbar { width: 0; display: none; }
    input::placeholder { color: #78716C; }
    input, button, textarea { font-family: inherit; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:translateY(0) } }
    @keyframes slideUp { from { opacity:0; transform:translateY(100%) } to { opacity:1; transform:translateY(0) } }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0) } 40% { transform:translateY(-5px) } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
    @keyframes expandWidth { from { width:0 } to { width:48px } }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.9) } to { opacity:1; transform:scale(1) } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ============================================================
    // CONFIG & DATA
    // ============================================================
    const API_URL = "/api/chat";

    const RESTAURANT = {
      name: "Spice Garden",
      tagline: "Contemporary Indian Kitchen",
      logo: "🌿",
      currency: "₹",
      categories: ["Starters", "Mains", "Breads", "Rice & Biryani", "Desserts", "Beverages"],
      menu: [
        { id:1, name:"Paneer Tikka", category:"Starters", price:329, veg:true, spicy:2, description:"Cottage cheese marinated in yogurt and spices, chargrilled in tandoor", allergens:["dairy"], calories:280, popular:true, chef_special:false },
        { id:2, name:"Chicken 65", category:"Starters", price:349, veg:false, spicy:3, description:"Hyderabadi-style deep fried chicken with curry leaves and red chilies", allergens:[], calories:350, popular:true, chef_special:false },
        { id:3, name:"Mutton Seekh Kebab", category:"Starters", price:429, veg:false, spicy:2, description:"Minced mutton with herbs and spices, cooked on skewers in tandoor", allergens:[], calories:310, popular:false, chef_special:true },
        { id:4, name:"Hara Bhara Kebab", category:"Starters", price:279, veg:true, spicy:1, description:"Spinach and pea patties with mint chutney, lightly pan-fried", allergens:[], calories:180, popular:false, chef_special:false },
        { id:5, name:"Crispy Corn", category:"Starters", price:249, veg:true, spicy:1, description:"Golden fried corn kernels tossed with spices, curry leaves and peppers", allergens:["corn"], calories:220, popular:true, chef_special:false },
        { id:6, name:"Butter Chicken", category:"Mains", price:399, veg:false, spicy:1, description:"Tender chicken in rich tomato-butter gravy with kasuri methi. Our signature dish", allergens:["dairy"], calories:450, popular:true, chef_special:true },
        { id:7, name:"Dal Makhani", category:"Mains", price:299, veg:true, spicy:1, description:"Black lentils slow-cooked overnight with butter and cream", allergens:["dairy"], calories:380, popular:true, chef_special:false },
        { id:8, name:"Paneer Butter Masala", category:"Mains", price:349, veg:true, spicy:1, description:"Cottage cheese cubes in creamy tomato gravy with cashew paste", allergens:["dairy","nuts"], calories:420, popular:true, chef_special:false },
        { id:9, name:"Chicken Chettinad", category:"Mains", price:429, veg:false, spicy:3, description:"Fiery Tamil Nadu style chicken curry with freshly ground spices", allergens:[], calories:380, popular:false, chef_special:true },
        { id:10, name:"Lamb Rogan Josh", category:"Mains", price:499, veg:false, spicy:2, description:"Kashmiri slow-cooked lamb in aromatic gravy with whole spices", allergens:[], calories:420, popular:false, chef_special:true },
        { id:11, name:"Palak Paneer", category:"Mains", price:319, veg:true, spicy:1, description:"Fresh spinach puree with soft paneer cubes and mild spices", allergens:["dairy"], calories:340, popular:false, chef_special:false },
        { id:12, name:"Chole Bhature", category:"Mains", price:279, veg:true, spicy:2, description:"Spiced chickpea curry served with fluffy deep-fried bread", allergens:["gluten"], calories:520, popular:true, chef_special:false },
        { id:13, name:"Butter Naan", category:"Breads", price:69, veg:true, spicy:0, description:"Soft leavened bread brushed with butter from our tandoor", allergens:["gluten","dairy"], calories:260, popular:true, chef_special:false },
        { id:14, name:"Garlic Naan", category:"Breads", price:79, veg:true, spicy:0, description:"Naan topped with fresh garlic and coriander", allergens:["gluten","dairy"], calories:280, popular:true, chef_special:false },
        { id:15, name:"Laccha Paratha", category:"Breads", price:69, veg:true, spicy:0, description:"Layered flaky whole wheat bread cooked in tandoor", allergens:["gluten"], calories:240, popular:false, chef_special:false },
        { id:16, name:"Hyderabadi Chicken Biryani", category:"Rice & Biryani", price:399, veg:false, spicy:2, description:"Fragrant basmati rice layered with spiced chicken, dum-cooked with saffron", allergens:[], calories:580, popular:true, chef_special:true },
        { id:17, name:"Veg Biryani", category:"Rice & Biryani", price:299, veg:true, spicy:2, description:"Mixed vegetables and paneer with basmati rice, herbs and whole spices", allergens:["dairy"], calories:450, popular:false, chef_special:false },
        { id:18, name:"Jeera Rice", category:"Rice & Biryani", price:179, veg:true, spicy:0, description:"Basmati rice tempered with cumin seeds and ghee", allergens:["dairy"], calories:320, popular:false, chef_special:false },
        { id:19, name:"Gulab Jamun", category:"Desserts", price:149, veg:true, spicy:0, description:"Soft milk dumplings soaked in rose-cardamom sugar syrup. Served warm", allergens:["dairy","gluten"], calories:380, popular:true, chef_special:false },
        { id:20, name:"Rasmalai", category:"Desserts", price:179, veg:true, spicy:0, description:"Soft paneer discs in chilled saffron-cardamom milk, topped with pistachios", allergens:["dairy","nuts"], calories:320, popular:false, chef_special:true },
        { id:21, name:"Kulfi Falooda", category:"Desserts", price:199, veg:true, spicy:0, description:"Traditional Indian ice cream with vermicelli, rose syrup and basil seeds", allergens:["dairy","gluten"], calories:400, popular:true, chef_special:false },
        { id:22, name:"Masala Chai", category:"Beverages", price:79, veg:true, spicy:0, description:"Authentic Indian spiced tea brewed with cardamom, ginger and cinnamon", allergens:["dairy"], calories:80, popular:true, chef_special:false },
        { id:23, name:"Mango Lassi", category:"Beverages", price:149, veg:true, spicy:0, description:"Chilled yogurt smoothie blended with Alphonso mango pulp", allergens:["dairy"], calories:200, popular:true, chef_special:false },
        { id:24, name:"Fresh Lime Soda", category:"Beverages", price:99, veg:true, spicy:0, description:"Freshly squeezed lime with soda water — sweet, salt, or mixed", allergens:[], calories:60, popular:false, chef_special:false },
        { id:25, name:"Cold Coffee", category:"Beverages", price:169, veg:true, spicy:0, description:"Creamy iced coffee blended with vanilla ice cream", allergens:["dairy"], calories:280, popular:false, chef_special:false },
      ],
      todaySpecials: ["Mutton Seekh Kebab", "Chicken Chettinad", "Rasmalai"],
      outOfStock: ["Kulfi Falooda"],
    };

    function buildMenuContext() {
      return RESTAURANT.menu.map(item => {
        const tags = [];
        if (item.veg) tags.push("VEG"); else tags.push("NON-VEG");
        if (item.popular) tags.push("POPULAR");
        if (item.chef_special) tags.push("CHEF SPECIAL");
        if (RESTAURANT.outOfStock.includes(item.name)) tags.push("OUT OF STOCK TODAY");
        if (RESTAURANT.todaySpecials.includes(item.name)) tags.push("TODAY'S SPECIAL");
        const spice = ["Not spicy","Mild","Medium","Spicy"][item.spicy];
        return `- ${item.name} (₹${item.price}) [${item.category}] [${tags.join(", ")}]: ${item.description}. Spice: ${spice}. Cal: ~${item.calories}. ${item.allergens.length?"Allergens: "+item.allergens.join(", "):"No common allergens"}.`;
      }).join("\n");
    }

    const T = {
      bg:"#0C0A09", bgCard:"#1C1917", bgEl:"#292524",
      acc:"#F59E0B", accSoft:"rgba(245,158,11,0.1)", accHov:"#D97706",
      tx:"#FAFAF9", txM:"#A8A29E", txD:"#78716C",
      brd:"#292524", brdL:"#3f3b37",
      ok:"#22C55E", err:"#EF4444", veg:"#22C55E", nv:"#EF4444",
    };

    // ============================================================
    // LOCAL STORAGE HELPERS
    // ============================================================
    function lsGet(k, fallback) {
      try { const v = localStorage.getItem("dineai_"+k); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
    }
    function lsSet(k, v) {
      try { localStorage.setItem("dineai_"+k, JSON.stringify(v)); } catch {}
    }

    // ============================================================
    // MAIN APP COMPONENT
    // ============================================================
    function DineAI() {
      const [screen, setScreen] = useState(() => lsGet("user",null) ? "main" : "splash");
      const [phone, setPhone] = useState("");
      const [otp, setOtp] = useState(["","","",""]);
      const [user, setUser] = useState(() => lsGet("user", null));
      const [tab, setTab] = useState("chat");
      const [cart, setCart] = useState([]);
      const [messages, setMessages] = useState([]);
      const [chatInput, setChatInput] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const [orderHistory, setOrderHistory] = useState(() => lsGet("orders",[]));
      const [menuFilter, setMenuFilter] = useState("All");
      const [vegOnly, setVegOnly] = useState(false);
      const [orderPlaced, setOrderPlaced] = useState(false);
      const [nameInput, setNameInput] = useState("");
      const [chatHistory, setChatHistory] = useState([]);
      const chatEndRef = useRef(null);
      const otpRefs = [useRef(), useRef(), useRef(), useRef()];

      // Splash timer
      useEffect(() => {
        if (screen === "splash") {
          const t = setTimeout(() => setScreen("login"), 2200);
          return () => clearTimeout(t);
        }
      }, [screen]);

      // Scroll chat
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior:"smooth" });
      }, [messages, isTyping]);

      // Welcome msg
      useEffect(() => {
        if (screen === "main" && messages.length === 0 && user) {
          const g = orderHistory.length > 0
            ? `Welcome back, ${user.name||"there"}! 🙌 Great to see you again at ${RESTAURANT.name}. Last time you had some great picks. Want me to suggest something similar, or feeling adventurous today?`
            : `Hey ${user.name||"there"}! Welcome to ${RESTAURANT.name} 🌿 I'm your AI dining companion. I know every dish on our menu inside out — ask me anything! Whether you want recommendations, have dietary needs, or just want to know what's 🔥 today, I'm here.`;
          setMessages([{role:"assistant",content:g}]);
          setChatHistory([{role:"assistant",content:g}]);
        }
      }, [screen, user]);

      // --- AUTH ---
      const handleLogin = () => { if(phone.length===10) setScreen("otp"); };
      const handleOtpChange = (idx, val) => {
        if(val.length>1) return;
        const n=[...otp]; n[idx]=val; setOtp(n);
        if(val && idx<3) otpRefs[idx+1].current?.focus();
      };
      const handleVerify = () => {
        if(otp.join("").length===4) {
          const u = { phone, name:"", joinedAt:new Date().toISOString() };
          setUser(u); lsSet("user",u); setScreen("name");
        }
      };
      const handleSetName = (name) => {
        const u = {...user, name}; setUser(u); lsSet("user",u); setScreen("main");
      };

      // --- CART ---
      const addToCart = (item) => {
        setCart(prev => {
          const ex = prev.find(c=>c.id===item.id);
          if(ex) return prev.map(c=>c.id===item.id?{...c,qty:c.qty+1}:c);
          return [...prev,{...item,qty:1}];
        });
      };
      const removeFromCart = (id) => {
        setCart(prev => {
          const ex=prev.find(c=>c.id===id);
          if(ex&&ex.qty>1) return prev.map(c=>c.id===id?{...c,qty:c.qty-1}:c);
          return prev.filter(c=>c.id!==id);
        });
      };
      const cartTotal = cart.reduce((s,c)=>s+c.price*c.qty,0);
      const cartCount = cart.reduce((s,c)=>s+c.qty,0);

      const placeOrder = () => {
        if(!cart.length) return;
        const order = { id:Date.now(), items:[...cart], total:cartTotal, date:new Date().toISOString(), status:"Preparing" };
        const nh = [order,...orderHistory];
        setOrderHistory(nh); lsSet("orders",nh);
        setCart([]); setOrderPlaced(true);
        setTimeout(()=>setOrderPlaced(false),3000);
      };

      // --- CHAT ---
      const sendMessage = async () => {
        if(!chatInput.trim()||isTyping) return;
        const userMsg = chatInput.trim();
        setChatInput("");

        const nm = [...messages,{role:"user",content:userMsg}];
        setMessages(nm);
        const nh = [...chatHistory,{role:"user",content:userMsg}];
        setChatHistory(nh);
        setIsTyping(true);

        try {
          const orderCtx = orderHistory.length>0
            ? "\n\nCustomer's past orders:\n"+orderHistory.slice(0,5).map(o=>"- "+o.items.map(i=>i.name).join(", ")+" ("+new Date(o.date).toLocaleDateString()+")").join("\n")
            : "\n\nNew customer, no past orders.";
          const cartCtx = cart.length>0 ? "\n\nIn cart: "+cart.map(c=>c.name+" x"+c.qty).join(", ") : "";

          const systemPrompt = `You are DineAI, the friendly AI dining assistant at ${RESTAURANT.name} (${RESTAURANT.tagline}). Help customers explore the menu and have a great experience.

FULL MENU:
${buildMenuContext()}

Today's specials: ${RESTAURANT.todaySpecials.join(", ")}
Out of stock: ${RESTAURANT.outOfStock.join(", ")}
${orderCtx}${cartCtx}

Customer: ${user?.name||"Guest"}

RULES:
- Be warm, fun, knowledgeable about food. Keep responses concise (2-4 sentences).
- Mention prices when recommending. Explain why they'd like something.
- Handle dietary restrictions carefully. Be precise about allergens — this is safety.
- If out of stock, apologize and suggest alternatives.
- Suggest pairings naturally (e.g. "that goes great with garlic naan!")
- Reference past orders if they have history.
- Use occasional emojis but don't overdo.
- Never make up dishes not on menu.
- Support Hindi, Kannada, English — respond in whatever language they use.`;

          const apiMsgs = nh.slice(-12).map(m=>({role:m.role,content:m.content}));

          const resp = await fetch(API_URL, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ system:systemPrompt, messages:apiMsgs }),
          });

          const data = await resp.json();
          const aiText = data.content?.[0]?.text || data.error?.message || "Sorry, having trouble. Try again?";

          setMessages(prev=>[...prev,{role:"assistant",content:aiText}]);
          setChatHistory(prev=>[...prev,{role:"assistant",content:aiText}]);
        } catch(err) {
          setMessages(prev=>[...prev,{role:"assistant",content:"I'm having a moment — could you try again? 😅"}]);
        }
        setIsTyping(false);
      };

      const quickSugs = [
        "What's popular today? 🔥",
        "I'm vegetarian, suggest something?",
        "Spiciest dish on the menu?",
        "Full meal under ₹800",
        orderHistory.length>0?"What did I order last time?":"Chef specials?",
      ];

      // ============================================================
      // RENDERS
      // ============================================================
      const cStyle = {
        maxWidth:430, margin:"0 auto", height:"100vh", background:T.bg, color:T.tx,
        fontFamily:"'DM Sans',sans-serif", position:"relative", overflow:"hidden",
        display:"flex", flexDirection:"column",
      };

      // --- SPLASH ---
      if (screen==="splash") return (
        <div style={{...cStyle, justifyContent:"center", alignItems:"center"}}>
          <div style={{animation:"fadeInUp 0.8s ease-out",textAlign:"center"}}>
            <div style={{fontSize:64,marginBottom:16}}>{RESTAURANT.logo}</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,margin:0,letterSpacing:-0.5}}>
              Dine<span style={{color:T.acc}}>AI</span>
            </h1>
            <p style={{color:T.txM,marginTop:8,fontSize:14,letterSpacing:2,textTransform:"uppercase"}}>Your AI Dining Companion</p>
            <div style={{width:48,height:3,background:T.acc,borderRadius:2,margin:"24px auto 0",animation:"expandWidth 1.5s ease-out"}}/>
          </div>
        </div>
      );

      // --- LOGIN ---
      if (screen==="login") return (
        <div style={{...cStyle, justifyContent:"center",padding:32}}>
          <div style={{animation:"fadeInUp 0.5s ease-out"}}>
            <div style={{textAlign:"center",marginBottom:48}}>
              <div style={{fontSize:48,marginBottom:12}}>{RESTAURANT.logo}</div>
              <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:28,margin:0}}>
                Welcome to <span style={{color:T.acc}}>{RESTAURANT.name}</span>
              </h1>
              <p style={{color:T.txM,marginTop:8,fontSize:15}}>Enter your phone number to get started</p>
            </div>
            <div style={{background:T.bgCard,borderRadius:16,padding:24,border:`1px solid ${T.brd}`}}>
              <label style={{fontSize:13,color:T.txM,marginBottom:8,display:"block",fontWeight:500}}>Mobile Number</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{background:T.bgEl,borderRadius:10,padding:"12px 14px",fontSize:16,color:T.txM,border:`1px solid ${T.brd}`,fontWeight:500}}>+91</div>
                <input type="tel" maxLength={10} value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,""))}
                  placeholder="Enter 10 digit number" autoFocus
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  style={{flex:1,background:T.bgEl,border:`1px solid ${phone.length===10?T.acc:T.brd}`,borderRadius:10,padding:"12px 14px",fontSize:16,color:T.tx,outline:"none",transition:"border 0.2s",letterSpacing:1}} />
              </div>
              <button onClick={handleLogin} disabled={phone.length!==10}
                style={{width:"100%",marginTop:20,padding:"14px",background:phone.length===10?T.acc:T.bgEl,color:phone.length===10?T.bg:T.txD,border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:phone.length===10?"pointer":"default",transition:"all 0.2s"}}>
                Send OTP →
              </button>
            </div>
            <p style={{color:T.txD,fontSize:12,textAlign:"center",marginTop:20,lineHeight:1.5}}>By continuing, you agree to our Terms of Service.<br/>We'll send a one-time verification code via SMS.</p>
          </div>
        </div>
      );

      // --- OTP ---
      if (screen==="otp") return (
        <div style={{...cStyle, justifyContent:"center",padding:32}}>
          <div style={{animation:"fadeInUp 0.5s ease-out"}}>
            <button onClick={()=>setScreen("login")} style={{background:"none",border:"none",color:T.txM,cursor:"pointer",display:"flex",alignItems:"center",gap:6,marginBottom:32,padding:0,fontSize:14}}>
              ‹ Back
            </button>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,margin:0}}>Verify your number</h2>
            <p style={{color:T.txM,marginTop:8,fontSize:15}}>We sent a code to +91 {phone}</p>
            <div style={{display:"flex",gap:12,marginTop:32,justifyContent:"center"}}>
              {otp.map((d,i)=>(
                <input key={i} ref={otpRefs[i]} type="tel" maxLength={1} value={d}
                  onChange={e=>handleOtpChange(i,e.target.value)}
                  onKeyDown={e=>{if(e.key==="Backspace"&&!d&&i>0)otpRefs[i-1].current?.focus()}}
                  autoFocus={i===0}
                  style={{width:56,height:64,background:T.bgCard,border:`2px solid ${d?T.acc:T.brd}`,borderRadius:12,fontSize:24,textAlign:"center",color:T.tx,outline:"none",fontFamily:"'JetBrains Mono',monospace",fontWeight:500,transition:"border 0.2s"}} />
              ))}
            </div>
            <button onClick={handleVerify} disabled={otp.join("").length!==4}
              style={{width:"100%",marginTop:32,padding:"14px",background:otp.join("").length===4?T.acc:T.bgEl,color:otp.join("").length===4?T.bg:T.txD,border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:otp.join("").length===4?"pointer":"default",transition:"all 0.2s"}}>
              Verify & Continue
            </button>
            <p style={{color:T.txD,fontSize:13,textAlign:"center",marginTop:20}}>Didn't receive? <span style={{color:T.acc,cursor:"pointer"}}>Resend in 30s</span></p>
            <p style={{color:T.txD,fontSize:11,textAlign:"center",marginTop:10,fontStyle:"italic"}}>Demo: enter any 4 digits</p>
          </div>
        </div>
      );

      // --- NAME ---
      if (screen==="name") return (
        <div style={{...cStyle, justifyContent:"center",padding:32}}>
          <div style={{animation:"fadeInUp 0.5s ease-out",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:16}}>👋</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,margin:0}}>What should we call you?</h2>
            <p style={{color:T.txM,marginTop:8,fontSize:15}}>So your AI companion can greet you properly</p>
            <input type="text" value={nameInput} onChange={e=>setNameInput(e.target.value)}
              placeholder="Your first name" autoFocus
              onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&handleSetName(nameInput.trim())}
              style={{width:"100%",maxWidth:280,marginTop:32,background:T.bgCard,border:`2px solid ${nameInput?T.acc:T.brd}`,borderRadius:12,padding:"14px 18px",fontSize:18,color:T.tx,outline:"none",textAlign:"center",transition:"border 0.2s"}} />
            <button onClick={()=>nameInput.trim()&&handleSetName(nameInput.trim())} disabled={!nameInput.trim()}
              style={{display:"block",width:"100%",maxWidth:280,margin:"20px auto 0",padding:"14px",background:nameInput.trim()?T.acc:T.bgEl,color:nameInput.trim()?T.bg:T.txD,border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:nameInput.trim()?"pointer":"default",transition:"all 0.2s"}}>
              Let's Go! ✨
            </button>
            <button onClick={()=>handleSetName("Guest")} style={{background:"none",border:"none",color:T.txD,marginTop:16,cursor:"pointer",fontSize:14}}>Skip for now</button>
          </div>
        </div>
      );

      // ============================================================
      // MAIN SCREEN
      // ============================================================
      const filteredMenu = RESTAURANT.menu.filter(item => {
        if(vegOnly&&!item.veg) return false;
        if(menuFilter!=="All"&&item.category!==menuFilter) return false;
        return true;
      });

      return (
        <div style={cStyle}>
          {/* HEADER */}
          <div style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${T.brd}`,background:T.bg,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:24}}>{RESTAURANT.logo}</span>
              <div>
                <h1 style={{margin:0,fontSize:17,fontFamily:"'Playfair Display',serif",fontWeight:600}}>{RESTAURANT.name}</h1>
                <p style={{margin:0,fontSize:11,color:T.txD,letterSpacing:0.5}}>{RESTAURANT.tagline}</p>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              {user?.name&&<span style={{fontSize:13,color:T.txM,marginRight:4}}>Hi, {user.name}</span>}
              <div style={{width:34,height:34,borderRadius:"50%",background:T.accSoft,display:"flex",alignItems:"center",justifyContent:"center",color:T.acc,cursor:"pointer"}}
                onClick={()=>setTab("profile")}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
            </div>
          </div>

          {/* CONTENT */}
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

            {/* === CHAT TAB === */}
            {tab==="chat"&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div style={{flex:1,overflowY:"auto",padding:"16px 16px 8px",display:"flex",flexDirection:"column",gap:12}}>
                  {messages.map((msg,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start",animation:"fadeIn 0.3s ease-out"}}>
                      {msg.role==="assistant"&&(
                        <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${T.acc},#F97316)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginRight:8,marginTop:2,fontSize:13}}>🤖</div>
                      )}
                      <div style={{maxWidth:"78%",padding:"10px 14px",borderRadius:msg.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:msg.role==="user"?T.acc:T.bgCard,color:msg.role==="user"?T.bg:T.tx,fontSize:14,lineHeight:1.5,border:msg.role==="assistant"?`1px solid ${T.brd}`:"none",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                        {msg.content}
                      </div>
                    </div>
                  ))}
                  {isTyping&&(
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${T.acc},#F97316)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
                      <div style={{background:T.bgCard,padding:"10px 16px",borderRadius:"16px 16px 16px 4px",border:`1px solid ${T.brd}`,display:"flex",gap:5,color:T.txM,fontSize:12}}>
                        <span style={{animation:"bounce 1s infinite 0s"}}>●</span>
                        <span style={{animation:"bounce 1s infinite 0.15s"}}>●</span>
                        <span style={{animation:"bounce 1s infinite 0.3s"}}>●</span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef}/>
                </div>
                {messages.length<=1&&(
                  <div style={{padding:"0 16px 8px",display:"flex",gap:8,overflowX:"auto",flexShrink:0}}>
                    {quickSugs.map((s,i)=>(
                      <button key={i} onClick={()=>setChatInput(s)} style={{flexShrink:0,background:T.bgCard,border:`1px solid ${T.brd}`,borderRadius:20,padding:"8px 14px",color:T.tx,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",transition:"border 0.2s"}}>
                        {s}
                      </button>
                    ))}
                  </div>
                )}
                <div style={{padding:"10px 16px 12px",borderTop:`1px solid ${T.brd}`,display:"flex",gap:8,alignItems:"flex-end",background:T.bg,flexShrink:0}}>
                  <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMessage()}
                    placeholder="Ask me anything about the menu..."
                    style={{flex:1,background:T.bgCard,border:`1px solid ${T.brd}`,borderRadius:22,padding:"11px 16px",fontSize:14,color:T.tx,outline:"none",transition:"border 0.2s"}}
                    onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.brd} />
                  <button onClick={sendMessage} disabled={!chatInput.trim()||isTyping}
                    style={{width:42,height:42,borderRadius:"50%",background:chatInput.trim()&&!isTyping?T.acc:T.bgEl,border:"none",color:chatInput.trim()&&!isTyping?T.bg:T.txD,cursor:chatInput.trim()&&!isTyping?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                  </button>
                </div>
              </div>
            )}

            {/* === MENU TAB === */}
            {tab==="menu"&&(
              <div style={{flex:1,overflowY:"auto"}}>
                <div style={{padding:"12px 16px 4px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <h2 style={{margin:0,fontSize:20,fontFamily:"'Playfair Display',serif"}}>Menu</h2>
                    <button onClick={()=>setVegOnly(!vegOnly)} style={{background:vegOnly?"rgba(34,197,94,0.15)":T.bgEl,border:`1px solid ${vegOnly?T.veg:T.brd}`,borderRadius:20,padding:"6px 14px",color:vegOnly?T.veg:T.txM,fontSize:13,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{color:T.veg}}>●</span> Veg Only
                    </button>
                  </div>
                  <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8}}>
                    {["All",...RESTAURANT.categories].map(cat=>(
                      <button key={cat} onClick={()=>setMenuFilter(cat)} style={{flexShrink:0,background:menuFilter===cat?T.acc:T.bgCard,color:menuFilter===cat?T.bg:T.txM,border:`1px solid ${menuFilter===cat?T.acc:T.brd}`,borderRadius:20,padding:"6px 14px",fontSize:13,cursor:"pointer",fontWeight:500,whiteSpace:"nowrap",transition:"all 0.2s"}}>
                        {cat}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{padding:"8px 16px 120px"}}>
                  {filteredMenu.map(item=>{
                    const inCart=cart.find(c=>c.id===item.id);
                    const oos=RESTAURANT.outOfStock.includes(item.name);
                    return (
                      <div key={item.id} style={{background:T.bgCard,borderRadius:14,padding:14,marginBottom:10,border:`1px solid ${T.brd}`,opacity:oos?0.5:1,transition:"all 0.2s"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div style={{flex:1,marginRight:12}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                              <span style={{color:item.veg?T.veg:T.nv,fontSize:8}}>◆</span>
                              <span style={{fontSize:15,fontWeight:600}}>{item.name}</span>
                              {item.popular&&<span style={{fontSize:10,background:"rgba(245,158,11,0.15)",color:T.acc,padding:"2px 6px",borderRadius:6,fontWeight:600}}>POPULAR</span>}
                              {item.chef_special&&<span style={{fontSize:10,background:"rgba(168,85,247,0.15)",color:"#A855F7",padding:"2px 6px",borderRadius:6,fontWeight:600}}>CHEF SPECIAL</span>}
                            </div>
                            <p style={{margin:"4px 0",fontSize:12,color:T.txM,lineHeight:1.4}}>{item.description}</p>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                              <span style={{fontSize:15,fontWeight:600}}>₹{item.price}</span>
                              {item.spicy>0&&<span style={{fontSize:11,color:T.txD}}>{"🌶️".repeat(item.spicy)}</span>}
                              <span style={{fontSize:11,color:T.txD}}>{item.calories} cal</span>
                            </div>
                          </div>
                          <div>
                            {oos ? <span style={{fontSize:11,color:T.err,fontWeight:500}}>Sold out</span>
                            : inCart ? (
                              <div style={{display:"flex",alignItems:"center",background:T.acc,borderRadius:10,overflow:"hidden"}}>
                                <button onClick={()=>removeFromCart(item.id)} style={{width:32,height:32,background:"transparent",border:"none",color:T.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700}}>−</button>
                                <span style={{width:24,textAlign:"center",fontSize:14,fontWeight:700,color:T.bg}}>{inCart.qty}</span>
                                <button onClick={()=>addToCart(item)} style={{width:32,height:32,background:"transparent",border:"none",color:T.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700}}>+</button>
                              </div>
                            ) : (
                              <button onClick={()=>addToCart(item)} style={{background:"transparent",border:`1.5px solid ${T.acc}`,borderRadius:10,padding:"6px 18px",color:T.acc,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}>ADD</button>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* === CART TAB === */}
            {tab==="cart"&&(
              <div style={{flex:1,overflowY:"auto",padding:16}}>
                <h2 style={{margin:"0 0 16px",fontSize:20,fontFamily:"'Playfair Display',serif"}}>Your Order</h2>
                {orderPlaced&&(
                  <div style={{background:"rgba(34,197,94,0.1)",border:`1px solid ${T.ok}`,borderRadius:14,padding:16,marginBottom:16,textAlign:"center",animation:"scaleIn 0.3s ease-out"}}>
                    <div style={{fontSize:32,marginBottom:8}}>🎉</div>
                    <p style={{margin:0,fontWeight:600,color:T.ok}}>Order Placed!</p>
                    <p style={{margin:"4px 0 0",fontSize:13,color:T.txM}}>Your food is being prepared</p>
                  </div>
                )}
                {cart.length===0&&!orderPlaced?(
                  <div style={{textAlign:"center",padding:"48px 0",color:T.txD}}>
                    <div style={{fontSize:48,marginBottom:12}}>🍽️</div>
                    <p style={{fontSize:15,margin:0}}>Your cart is empty</p>
                    <p style={{fontSize:13,marginTop:4}}>Chat with AI or browse the menu to add items</p>
                  </div>
                ):(
                  <>
                    {cart.map(item=>(
                      <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgCard,borderRadius:12,padding:14,border:`1px solid ${T.brd}`,marginBottom:8}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{color:item.veg?T.veg:T.nv,fontSize:8}}>◆</span>
                            <span style={{fontWeight:500,fontSize:14}}>{item.name}</span>
                          </div>
                          <span style={{fontSize:13,color:T.txM}}>₹{item.price}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center"}}>
                          <div style={{display:"flex",alignItems:"center",background:T.bgEl,borderRadius:8,overflow:"hidden",border:`1px solid ${T.brd}`}}>
                            <button onClick={()=>removeFromCart(item.id)} style={{width:30,height:30,background:"transparent",border:"none",color:T.tx,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>−</button>
                            <span style={{width:24,textAlign:"center",fontSize:14,fontWeight:600}}>{item.qty}</span>
                            <button onClick={()=>addToCart(item)} style={{width:30,height:30,background:"transparent",border:"none",color:T.tx,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>+</button>
                          </div>
                          <span style={{width:60,textAlign:"right",fontWeight:600,fontSize:14}}>₹{item.price*item.qty}</span>
                        </div>
                      </div>
                    ))}
                    {cart.length>0&&(
                      <div style={{marginTop:16}}>
                        <div style={{background:T.bgCard,borderRadius:14,padding:16,border:`1px solid ${T.brd}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:T.txM,fontSize:14}}>Subtotal</span><span style={{fontSize:14}}>₹{cartTotal}</span></div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:T.txM,fontSize:14}}>GST (5%)</span><span style={{fontSize:14}}>₹{Math.round(cartTotal*0.05)}</span></div>
                          <div style={{borderTop:`1px solid ${T.brd}`,paddingTop:8,marginTop:8,display:"flex",justifyContent:"space-between"}}>
                            <span style={{fontWeight:700,fontSize:16}}>Total</span>
                            <span style={{fontWeight:700,fontSize:16,color:T.acc}}>₹{cartTotal+Math.round(cartTotal*0.05)}</span>
                          </div>
                        </div>
                        <button onClick={placeOrder} style={{width:"100%",marginTop:16,padding:"14px",background:T.acc,color:T.bg,border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer",transition:"background 0.2s"}}>
                          Place Order • ₹{cartTotal+Math.round(cartTotal*0.05)}
                        </button>
                      </div>
                    )}
                  </>
                )}
                {orderHistory.length>0&&(
                  <div style={{marginTop:32}}>
                    <h3 style={{fontSize:16,fontFamily:"'Playfair Display',serif",marginBottom:12,color:T.txM}}>Past Orders</h3>
                    {orderHistory.slice(0,5).map(order=>(
                      <div key={order.id} style={{background:T.bgCard,borderRadius:12,padding:14,border:`1px solid ${T.brd}`,marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span style={{fontSize:12,color:T.txM}}>{new Date(order.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</span>
                          <span style={{fontSize:13,fontWeight:600}}>₹{order.total}</span>
                        </div>
                        <p style={{margin:0,fontSize:13,color:T.txM}}>{order.items.map(i=>i.name+" x"+i.qty).join(", ")}</p>
                        <button onClick={()=>order.items.forEach(item=>{const m=RESTAURANT.menu.find(x=>x.id===item.id);if(m)for(let k=0;k<item.qty;k++)addToCart(m);})}
                          style={{background:T.accSoft,border:`1px solid ${T.acc}30`,borderRadius:8,padding:"6px 12px",marginTop:8,color:T.acc,fontSize:12,fontWeight:600,cursor:"pointer"}}>Reorder</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{height:80}}/>
              </div>
            )}

            {/* === PROFILE TAB === */}
            {tab==="profile"&&(
              <div style={{flex:1,overflowY:"auto",padding:16}}>
                <h2 style={{margin:"0 0 24px",fontSize:20,fontFamily:"'Playfair Display',serif"}}>Profile</h2>
                <div style={{background:T.bgCard,borderRadius:16,padding:24,border:`1px solid ${T.brd}`,textAlign:"center",marginBottom:16}}>
                  <div style={{width:64,height:64,borderRadius:"50%",background:`linear-gradient(135deg,${T.acc},#F97316)`,margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontFamily:"'Playfair Display',serif",fontWeight:700,color:T.bg}}>
                    {(user?.name||"G")[0].toUpperCase()}
                  </div>
                  <h3 style={{margin:0,fontSize:18}}>{user?.name||"Guest"}</h3>
                  <p style={{margin:"4px 0 0",fontSize:13,color:T.txM}}>+91 {user?.phone||"XXXXXXXXXX"}</p>
                </div>
                <div style={{background:T.bgCard,borderRadius:14,padding:16,border:`1px solid ${T.brd}`,marginBottom:16}}>
                  <h4 style={{margin:"0 0 12px",fontSize:14,color:T.txM,fontWeight:500}}>Your Stats</h4>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {[
                      {l:"Orders",v:orderHistory.length,ic:"📦"},
                      {l:"Total Spent",v:"₹"+orderHistory.reduce((s,o)=>s+o.total,0),ic:"💰"},
                      {l:"Favorite",v:(()=>{const c={};orderHistory.forEach(o=>o.items.forEach(i=>{c[i.name]=(c[i.name]||0)+i.qty}));const s=Object.entries(c).sort((a,b)=>b[1]-a[1]);return s[0]?.[0]||"—"})(),ic:"❤️"},
                      {l:"Member Since",v:user?.joinedAt?new Date(user.joinedAt).toLocaleDateString("en-IN",{month:"short",year:"numeric"}):"Today",ic:"📅"},
                    ].map((s,i)=>(
                      <div key={i} style={{background:T.bgEl,borderRadius:10,padding:12,border:`1px solid ${T.brd}`}}>
                        <div style={{fontSize:20,marginBottom:4}}>{s.ic}</div>
                        <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{s.v}</div>
                        <div style={{fontSize:11,color:T.txD}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{background:T.bgCard,borderRadius:14,padding:16,border:`1px solid ${T.brd}`}}>
                  <h4 style={{margin:"0 0 12px",fontSize:14,color:T.txM,fontWeight:500}}>AI Memory</h4>
                  <p style={{margin:0,fontSize:13,color:T.txM,lineHeight:1.6}}>
                    {orderHistory.length>0?`Based on your ${orderHistory.length} visit(s), our AI remembers your preferences and past orders to give personalized recommendations.`:"As you order more, our AI will learn your preferences and give increasingly personalized recommendations!"}
                  </p>
                  <div style={{marginTop:12,padding:"10px 14px",background:T.accSoft,borderRadius:10,display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:16}}>✨</span><span style={{fontSize:12,color:T.acc}}>Your data stays private and is only used for recommendations</span>
                  </div>
                </div>
                <button onClick={()=>{localStorage.removeItem("dineai_user");localStorage.removeItem("dineai_orders");setUser(null);setOrderHistory([]);setMessages([]);setChatHistory([]);setCart([]);setScreen("login");setPhone("");setOtp(["","","",""])}}
                  style={{width:"100%",marginTop:24,padding:"12px",background:"transparent",border:`1px solid ${T.err}30`,borderRadius:12,color:T.err,fontSize:14,cursor:"pointer"}}>Sign Out</button>
                <div style={{height:80}}/>
              </div>
            )}
          </div>

          {/* CART FLOAT on MENU */}
          {tab==="menu"&&cartCount>0&&(
            <div style={{position:"absolute",bottom:72,left:16,right:16,background:T.acc,borderRadius:14,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",boxShadow:"0 8px 32px rgba(0,0,0,0.5)",animation:"slideUp 0.3s ease-out",maxWidth:398}} onClick={()=>setTab("cart")}>
              <span style={{fontWeight:700,color:T.bg,fontSize:14}}>{cartCount} item{cartCount>1?"s":""} added</span>
              <span style={{fontWeight:700,color:T.bg,fontSize:15}}>View Cart →</span>
            </div>
          )}

          {/* BOTTOM NAV */}
          <div style={{display:"flex",borderTop:`1px solid ${T.brd}`,background:T.bg,flexShrink:0,paddingBottom:4}}>
            {[
              {id:"chat",label:"Chat",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
              {id:"menu",label:"Menu",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>},
              {id:"cart",label:"Cart",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,badge:cartCount},
              {id:"profile",label:"Profile",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{flex:1,padding:"10px 0 6px",background:"none",border:"none",color:tab===t.id?T.acc:T.txD,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",transition:"color 0.2s"}}>
                <div style={{position:"relative"}}>
                  {t.svg}
                  {t.badge>0&&<span style={{position:"absolute",top:-6,right:-10,background:T.err,color:"#fff",fontSize:10,fontWeight:700,width:16,height:16,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
                </div>
                <span style={{fontSize:10,fontWeight:tab===t.id?600:400}}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.render(<DineAI />, document.getElementById("root"));
  </script>
</body>
</html>
